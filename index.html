<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookie Clicker Remix</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to bottom, #3b1f0f, #8b4513);
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 20px;
        font-size: 50px;
    }

    #cookie {
        width: 220px;
        cursor: pointer;
        transition: transform 0.1s;
    }

    #cookie:active {
        transform: scale(0.9);
    }

    #stats {
        font-size: 28px;
        margin: 20px;
    }

    #shop {
        margin-top: 30px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
    }

    .upgrade {
        background: rgba(255,255,255,0.1);
        border: 2px solid white;
        border-radius: 10px;
        padding: 15px;
        width: 220px;
    }

    button {
        padding: 10px 15px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: orange;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: darkorange;
    }
</style>
</head>

<body>

<h1>🍪 Cookie Clicker Remix</h1>

<div id="stats">
    Cookies: <span id="cookies">0</span><br>
    Per Second: <span id="cps">0</span>
</div>

<img
id="cookie"
src="https://upload.wikimedia.org/wikipedia/commons/7/70/Chocolate_Chip_Cookies_-_kimberlykv.jpg"
alt="Cookie"
/>

<h2>🏪 Upgrades</h2>

<div id="shop">

    <div class="upgrade">
        <h3>Grandma</h3>
        <p>+1 cookie/sec</p>
        <p>Cost: 50</p>
        <button onclick="buyUpgrade('grandma')">Buy</button>
    </div>

    <div class="upgrade">
        <h3>Farm</h3>
        <p>+10 cookies/sec</p>
        <p>Cost: 500</p>
        <button onclick="buyUpgrade('farm')">Buy</button>
    </div>

    <div class="upgrade">
        <h3>Factory</h3>
        <p>+1000 cookies/sec</p>
        <p>Cost: 5000</p>
        <button onclick="buyUpgrade('factory')">Buy</button>
    </div>

    <div class="upgrade">
        <h3>Bank</h3>
        <p>+10000 cookies/sec</p>
        <p>Cost: 50000</p>
        <button onclick="buyUpgrade('bank')">Buy</button>
    </div>

    <div class="upgrade">
        <h3>MEGA FACTORY 🏭</h3>
        <p>+100 TRILLION cookies/sec</p>
        <p>Cost: 800 MILLION</p>
        <button onclick="buyUpgrade('megaFactory')">Buy</button>
    </div>

</div>

<script>

let cookies = Number(localStorage.getItem("cookies")) || 0;
let cps = Number(localStorage.getItem("cps")) || 0;

const cookieText = document.getElementById("cookies");
const cpsText = document.getElementById("cps");

function formatNumber(num) {
    if (num >= 1e15) return (num / 1e15).toFixed(1) + "Q";
    if (num >= 1e12) return (num / 1e12).toFixed(1) + "T";
    if (num >= 1e9) return (num / 1e9).toFixed(1) + "B";
    if (num >= 1e6) return (num / 1e6).toFixed(1) + "M";
    if (num >= 1e3) return (num / 1e3).toFixed(1) + "K";
    return Math.floor(num);
}

function updateDisplay() {
    cookieText.textContent = formatNumber(cookies);
    cpsText.textContent = formatNumber(cps);

    localStorage.setItem("cookies", cookies);
    localStorage.setItem("cps", cps);
}

document.getElementById("cookie").addEventListener("click", () => {
    cookies += 1;
    updateDisplay();
});

function buyUpgrade(type) {

    const upgrades = {
        grandma: {
            cost: 50,
            gain: 1
        },

        farm: {
            cost: 500,
            gain: 10
        },

        factory: {
            cost: 5000,
            gain: 1000
        },

        bank: {
            cost: 50000,
            gain: 10000
        },

        megaFactory: {
            cost: 800000000,
            gain: 100000000000000
        }
    };

    let upgrade = upgrades[type];

    if (cookies >= upgrade.cost) {
        cookies -= upgrade.cost;
        cps += upgrade.gain;

        alert("Purchased " + type + "!");

        updateDisplay();
    } else {
        alert("Not enough cookies!");
    }
}

setInterval(() => {
    cookies += cps;
    updateDisplay();
}, 1000);

updateDisplay();

</script>

</body>
</html>
